<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="color-scheme" content="light dark" />
<title>Yahoo Chart Assistant</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #111827;
    --fg-dim: #6b7280;
    --card: #f3f4f6;
    --ok: #16a34a;
    --warn: #d97706;
    --err: #dc2626;
    --border: #e5e7eb;
    --grey: #9ca3af;
    --stock-tint: #f0fdf4;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1f2937;
      --fg: #f9fafb;
      --fg-dim: #9ca3af;
      --card: #111827;
      --ok: #16a34a;
      --warn: #d97706;
      --err: #dc2626;
      --border: #374151;
      --grey: #6b7280;
      --stock-tint: rgba(20, 83, 45, 0.35);
    }
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    padding: 0;
  }

  body {
    width: 320px;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }

  #app {
    width: 320px;
  }

  .popup {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 12px 14px 10px;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--fg);
  }

  .header-left svg {
    color: var(--fg-dim);
    flex-shrink: 0;
  }

  .title {
    font-size: 13px;
    font-weight: 600;
  }

  .dot {
    display: inline-block;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-sm {
    width: 10px;
    height: 10px;
  }

  .dot-ok {
    background: var(--ok);
  }

  .dot-warn {
    background: var(--warn);
  }

  .dot-err {
    background: var(--err);
  }

  .dot-grey {
    background: var(--grey);
  }

  .rows {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }

  .row .dot {
    margin-top: 4px;
  }

  .row-text {
    min-width: 0;
  }

  .row-main {
    font-size: 13px;
    font-weight: 600;
    color: var(--fg);
  }

  .row-sub {
    font-size: 12px;
    color: var(--fg-dim);
    margin-top: 1px;
  }

  .stock-card {
    border-radius: 10px;
    padding: 16px;
    background: var(--stock-tint);
  }

  .stock-card.muted {
    background: var(--card);
    text-align: center;
    padding: 20px 16px;
  }

  .muted-text {
    font-size: 13px;
    color: var(--fg-dim);
  }

  .banner {
    font-size: 12px;
    color: var(--warn);
    background: rgba(217, 119, 6, 0.14);
    border-radius: 6px;
    padding: 6px 8px;
    margin-bottom: 10px;
  }

  .stock-card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }

  .stock-symbol-wrap {
    display: flex;
    align-items: baseline;
    gap: 8px;
    flex-wrap: wrap;
    min-width: 0;
  }

  .stock-symbol {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--fg);
    line-height: 1.1;
  }

  .stock-title {
    font-size: 12px;
    color: var(--fg-dim);
  }

  .stock-sub {
    font-size: 12px;
    color: var(--fg-dim);
    margin-top: 8px;
  }

  .stock-sub-dim {
    font-size: 12px;
    color: var(--fg-dim);
    margin-top: 2px;
  }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    padding: 5px 9px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--fg);
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .btn-secondary:hover {
    background: var(--border);
  }

  .config-details summary {
    font-size: 12px;
    cursor: pointer;
    color: var(--fg-dim);
    list-style: none;
  }

  .config-details summary::-webkit-details-marker {
    display: none;
  }

  .config-details[open] summary {
    color: var(--fg);
    font-weight: 600;
    margin-bottom: 8px;
  }

  .config-body {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .code-block {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    background: #111827;
    border-radius: 8px;
    padding: 10px;
  }

  .code-block pre {
    margin: 0;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 11px;
    color: #e5e7eb;
    white-space: pre-wrap;
    word-break: break-all;
    flex: 1;
    min-width: 0;
  }

  .code-block .btn-secondary {
    background: #1f2937;
    color: #f9fafb;
    border-color: #374151;
  }

  .code-block .btn-secondary:hover {
    background: #374151;
  }

  .config-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--fg-dim);
    margin-bottom: 4px;
  }

  .config-note {
    font-size: 12px;
    color: var(--fg-dim);
    line-height: 1.5;
  }

  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 6px;
    border-top: 1px solid var(--border);
  }

  .version {
    font-size: 11px;
    color: var(--fg-dim);
  }

  .link-btn {
    font-size: 12px;
    color: var(--fg-dim);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    text-decoration: underline;
  }

  .link-btn:hover {
    color: var(--fg);
  }

  .fallback {
    font-size: 13px;
    color: var(--fg-dim);
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: flex-start;
    padding: 16px 0;
  }
</style>
</head>
<body>
<div id="app"></div>
<script src="popup.js"></script>
</body>
</html>
